<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>آزمون آنلاین</title>

<style>
body{
  font-family:sans-serif;
  direction:rtl;
  background:linear-gradient(120deg,#4facfe,#00f2fe);
  text-align:center;
  margin:0;
  padding:0;
}

.card{
  background:white;
  width:380px;
  margin:50px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#007bff;
}

img{
  width:100%;
  border-radius:10px;
}

#exam{
  display:none;
}

#timer{
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}

#result{
  font-size:22px;
  color:green;
  margin-top:15px;
}
</style>
</head>

<body>

<!-- صفحه شروع -->
<div id="start" class="card">
  <h2>آزمون 5 سوالی</h2>
  <p>زمان آزمون: 7 دقیقه</p>
  <button onclick="startExam()">شروع آزمون</button>
</div>

<!-- صفحه آزمون -->
<div id="exam" class="card">

<h2>آزمون آنلاین</h2>
<div id="timer">07:00</div>

<img id="img" src="q1.png">

<div>
<button onclick="answer(1)">1</button>
<button onclick="answer(2)">2</button>
<button onclick="answer(3)">3</button>
<button onclick="answer(4)">4</button>
</div>

<button onclick="next()">سوال بعد</button>

<div id="result"></div>

</div>

<script>

let q = 0;
let score = 0;
let time = 420;
let timer;

let questions = [
  {img:"q1.png"},
  {img:"q2.png"},
  {img:"q3.png"},
  {img:"q4.png"},
  {img:"q5.png"}
];

let answers = [2,1,4,3,2];

// شروع آزمون
function startExam(){
  document.getElementById("start").style.display="none";
  document.getElementById("exam").style.display="block";

  load();
  startTimer();
}

// لود سوال
function load(){
  document.getElementById("img").src = questions[q].img;
}

// جواب
function answer(val){
  if(val === answers[q]){
    score++;
  }
}

// سوال بعد
function next(){
  q++;
  if(q >= questions.length){
    finish();
  }else{
    load();
  }
}

// پایان
function finish(){
  clearInterval(timer);
  document.getElementById("result").innerHTML =
    "نمره شما: " + score + " از 5";
}

// تایمر
function startTimer(){
  timer = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time%60;

    document.getElementById("timer").innerHTML =
      (m<10?"0":"")+m+":"+(s<10?"0":"")+s;

    time--;

    if(time < 0){
      finish();
    }
  },1000);
}

</script>

</body>
</html>
