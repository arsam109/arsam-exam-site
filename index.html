<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>آزمون آنلاین</title>

<style>
body{
  font-family: sans-serif;
  direction: rtl;
  background: linear-gradient(120deg,#4facfe,#00f2fe);
  margin:0;
  padding:0;
  text-align:center;
}

.card{
  background:white;
  width:380px;
  margin:50px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

img{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

button{
  width:45%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#4facfe;
  color:white;
  font-size:16px;
}

button:hover{
  background:#007bff;
}

#timer{
  font-size:20px;
  margin-bottom:10px;
  font-weight:bold;
}

#result{
  font-size:22px;
  margin-top:15px;
  color:green;
}
</style>
</head>

<body>

<div class="card">

<h2>آزمون آنلاین</h2>
<div id="timer">07:00</div>

<img id="img" src="q1.png">

<div>
<button onclick="answer(1)">گزینه 1</button>
<button onclick="answer(2)">گزینه 2</button>
<button onclick="answer(3)">گزینه 3</button>
<button onclick="answer(4)">گزینه 4</button>
</div>

<button onclick="next()">سوال بعد</button>

<div id="result"></div>

</div>

<script>

let q = 0;
let score = 0;

let questions = [
  {img:"q1.png"},
  {img:"q2.png"},
  {img:"q3.png"},
  {img:"q4.png"},
  {img:"q5.png"}
];

// جواب‌های درست (خودت اگر خواستی عوض کن)
let answers = [2,1,4,3,2];

// لود سوال
function load(){
  document.getElementById("img").src = questions[q].img;
}

// جواب دادن
function answer(val){
  if(val === answers[q]){
    score++;
  }
}

// سوال بعد
function next(){
  q++;
  if(q >= questions.length){
    finish();
  }else{
    load();
  }
}

// پایان
function finish(){
  document.getElementById("result").innerHTML =
    "نمره شما: " + score + " از 5";
  clearInterval(timer);
}

// تایمر 7 دقیقه
let time = 420;

let timer = setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;

  document.getElementById("timer").innerHTML =
    (m<10?"0":"")+m+":"+(s<10?"0":"")+s;

  time--;

  if(time < 0){
    finish();
  }

},1000);

load();

</script>

</body>
</html>
