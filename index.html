<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>آزمون ساده</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      direction: rtl;
    }
    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }
    button {
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>آزمون آنلاین ساده</h2>

<div class="box">

  <p>1) 5 + 3 = ؟</p>
  <button onclick="answer(1,6)">6</button>
  <button onclick="answer(1,8)">8</button>

  <hr>

  <p>2) 4 × 2 = ؟</p>
  <button onclick="answer(2,6)">6</button>
  <button onclick="answer(2,8)">8</button>

  <br><br>

  <button onclick="showResult()">نمایش نتیجه</button>

  <h3 id="result"></h3>

</div>

<script>
let score = 0;
let done = {};

function answer(q, val) {
  if (done[q]) return;

  if (q === 1 && val === 8) score++;
  if (q === 2 && val === 8) score++;

  done[q] = true;
}

function showResult() {
  document.getElementById("result").innerHTML =
    "نمره شما: " + score + " از 2";
}
</script>

</body>
</html>
