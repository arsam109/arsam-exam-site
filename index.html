<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>آزمون آنلاین</title>

<style>
body{
  font-family:sans-serif;
  direction:rtl;
  background:linear-gradient(120deg,#4facfe,#00f2fe);
  text-align:center;
  margin:0;
}

.card{
  background:white;
  width:420px;
  margin:30px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
  cursor:pointer;
}

#reportBtn{
  background:orange;
  color:black;
  display:none;
}

img{width:100%; border-radius:10px;}

#exam{display:none;}
#report{margin-top:10px;}
</style>
</head>

<body>

<!-- START -->
<div id="start" class="card">
  <h2>آزمون آنلاین</h2>
  <input id="name" placeholder="نام دانش‌آموز">
  <br><br>
  <button onclick="startExam()">شروع آزمون</button>
</div>

<!-- EXAM -->
<div id="exam" class="card">

<h2 id="title"></h2>

<img id="img">

<div id="options"></div>

<br>

<button onclick="prev()">⬅ قبلی</button>
<button onclick="next()">➡ بعدی</button>

<br>

<button id="reportBtn" onclick="showReport()">بررسی آزمون</button>

<div id="report"></div>

<div id="chart"></div>

<h3 id="result"></h3>

</div>

<script>

let q = 0;
let userName = "";
let userAnswers = [];

let questions = [
  {img:"q1.png", opt:5},
  {img:"q2.png", opt:4},
  {img:"q3.png", opt:4},
  {img:"q4.png", opt:4},
  {img:"q5.png", opt:4}
];

// جواب‌ها
let answers = [5,4,2,1,3];

// شروع آزمون
function startExam(){
  userName = document.getElementById("name").value || "ناشناس";
  document.getElementById("start").style.display="none";
  document.getElementById("exam").style.display="block";
  load();
}

// لود سوال
function load(){
  document.getElementById("img").src = questions[q].img;
  document.getElementById("title").innerText = "سوال " + (q+1);

  let max = questions[q].opt;
  let html = "";

  for(let i=1;i<=max;i++){
    html += `<button onclick="answer(${i})">${i}</button>`;
  }

  document.getElementById("options").innerHTML = html;
}

// ثبت جواب
function answer(v){
  userAnswers[q] = v;
}

// سوال بعد
function next(){
  if(q < questions.length-1){
    q++;
    load();
  }else{
    finish();
  }
}

// سوال قبل
function prev(){
  if(q > 0){
    q--;
    load();
  }
}

// پایان آزمون
function finish(){
  document.getElementById("reportBtn").style.display="inline-block";
  document.getElementById("result").innerHTML = "آزمون تمام شد ✔";
}

// بررسی آزمون
function showReport(){

  let correct = 0;
  let wrong = 0;
  let blank = 0;

  for(let i=0;i<questions.length;i++){

    if(userAnswers[i] == undefined){
      blank++;
    }
    else if(userAnswers[i] == answers[i]){
      correct++;
    }
    else{
      wrong++;
    }
  }

  // قانون 2 غلط = 1 درست منفی
  let net = correct - (wrong / 2);
  if(net < 0) net = 0;

  let percent = Math.round((net / questions.length) * 100);

  document.getElementById("report").innerHTML = `
    <h3>📊 کارنامه</h3>
    <p>👤 نام: ${userName}</p>
    <p>✅ درست: ${correct}</p>
    <p>❌ غلط: ${wrong}</p>
    <p>⚪ نزده: ${blank}</p>
    <p>📊 درصد: ${percent}%</p>
  `;

  showChart(correct, wrong, blank);
}

// نمودار عملکرد
function showChart(correct, wrong, blank){

  const data = {
    chartType: "pie",
    meta: {
      title: "عملکرد آزمون",
      description: "درست، غلط و نزده"
    },
    nameKey: "type",
    valueKey: "count",
    data: [
      { type: "درست", count: correct },
      { type: "غلط", count: wrong },
      { type: "نزده", count: blank }
    ]
  };

  window.__renderChart?.(data);
}

</script>

</body>
</html>
