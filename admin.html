<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>
<body>

<h2>🎛 پنل ادمین</h2>

<select id="student">
  <option>آرسام جلینی</option>
  <option>مریم حبیبی</option>
  <option>HTTPSCHEAHMEHLDN</option>
  <option>موشی</option>
  <option>اروین</option>
</select>

<br><br>

<input id="exam" placeholder="نام آزمون (exam1)">

<br><br>

<button onclick="activate()">فعال‌سازی آزمون</button>

<p id="msg"></p>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function activate(){

  let student = document.getElementById("student").value;
  let exam = document.getElementById("exam").value;

  db.collection("exams").doc(student).set({
    active: true,
    exam: exam
  });

  document.getElementById("msg").innerText =
    "✔ آزمون فعال شد برای " + student;
}
</script>

</body>
</html>
