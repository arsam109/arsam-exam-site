<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>پنل ادمین</title>

<style>
body{font-family:sans-serif;direction:rtl;text-align:center}
.card{width:400px;margin:20px auto;background:#fff;padding:20px;border-radius:10px}
button{padding:8px;margin:5px;background:#4facfe;color:#fff;border:none;border-radius:8px}
</style>
</head>

<body>

<div class="card">

<h2>🎛 پنل ادمین</h2>

<select id="examName">
  <option value="exam1">آزمون 1</option>
  <option value="exam2">آزمون 2</option>
</select>

<br><br>

<select id="student">
  <option>آرسام جلینی</option>
  <option>مریم حبیبی</option>
  <option>HTTPSCHEAHMEHLDN</option>
  <option>موشی</option>
  <option>اروین</option>
</select>

<br><br>

<button onclick="addToExam()">اضافه به آزمون</button>
<button onclick="saveExam()">ذخیره</button>

<hr>

<button onclick="showRank()">📊 رتبه‌بندی (فقط ادمین)</button>

<div id="list"></div>
<div id="rank"></div>

</div>

<script>

let exams = JSON.parse(localStorage.getItem("exams") || "{}");

function addToExam(){

  let exam = document.getElementById("examName").value;
  let student = document.getElementById("student").value;

  if(!exams[exam]) exams[exam] = {students:[],answers:[5,4,2,1,3]};

  exams[exam].students.push(student);

  document.getElementById("list").innerHTML =
    "✔ اضافه شد: " + student + " به " + exam;
}

function saveExam(){
  localStorage.setItem("exams", JSON.stringify(exams));
  alert("ذخیره شد ✔");
}

// فقط ادمین رتبه‌بندی
function showRank(){

  let html = "<h3>📊 رتبه‌بندی مخفی</h3>";

  for(let ex in exams){
    html += `<p>${ex} → ${exams[ex].students.join(", ")}</p>`;
  }

  document.getElementById("rank").innerHTML = html;
}

</script>

</body>
</html>
